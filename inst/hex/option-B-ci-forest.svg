<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 618 715"
     width="618" height="715"
     role="img" aria-labelledby="title desc">
  <title id="title">sitemix hex sticker — Option B: CI forest</title>
  <desc id="desc">Light hexagonal sticker with the lowercase wordmark "sitemix" at the top in deep blue and a small forest of vertical confidence-interval bars in the lower half crossed by a horizontal common-mean reference line.</desc>

  <defs>
    <clipPath id="hexClip">
      <polygon points="309,5 612,179 612,536 309,710 6,536 6,179" />
    </clipPath>
  </defs>

  <!-- Light hex fill, dark border -->
  <polygon points="309,5 612,179 612,536 309,710 6,536 6,179"
           fill="#F4F4F4" stroke="#1B4965" stroke-width="3" />

  <!-- Wordmark -->
  <text x="309" y="180"
        text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="92" font-weight="600"
        fill="#1B4965"
        letter-spacing="-2">sitemix</text>

  <!-- Tagline -->
  <text x="309" y="225"
        text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="300"
        fill="#5FA8D3"
        letter-spacing="2">first-stage estimates</text>

  <g clip-path="url(#hexClip)">
    <!-- Common-mean reference line (light) -->
    <line x1="80" y1="520" x2="538" y2="520"
          stroke="#62B6CB" stroke-width="2.5" stroke-dasharray="6,6" opacity="0.85" />

    <!-- 12 vertical CI bars: each bar is a rectangle (the interval).
         Heights vary (precision); the bar tops/bottoms straddle the
         reference line by different amounts (site-effects).
         Bars use primary color #1B4965 with rounded caps. -->
    <line x1="120" y1="455" x2="120" y2="585"
          stroke="#1B4965" stroke-width="9" stroke-linecap="round" />
    <line x1="158" y1="430" x2="158" y2="610"
          stroke="#1B4965" stroke-width="9" stroke-linecap="round" />
    <line x1="196" y1="470" x2="196" y2="570"
          stroke="#1B4965" stroke-width="9" stroke-linecap="round" />
    <line x1="234" y1="445" x2="234" y2="595"
          stroke="#1B4965" stroke-width="9" stroke-linecap="round" />
    <line x1="272" y1="460" x2="272" y2="580"
          stroke="#1B4965" stroke-width="9" stroke-linecap="round" />
    <line x1="310" y1="420" x2="310" y2="620"
          stroke="#1B4965" stroke-width="9" stroke-linecap="round" />
    <line x1="348" y1="450" x2="348" y2="590"
          stroke="#1B4965" stroke-width="9" stroke-linecap="round" />
    <line x1="386" y1="465" x2="386" y2="575"
          stroke="#1B4965" stroke-width="9" stroke-linecap="round" />
    <line x1="424" y1="440" x2="424" y2="600"
          stroke="#1B4965" stroke-width="9" stroke-linecap="round" />
    <line x1="462" y1="475" x2="462" y2="565"
          stroke="#1B4965" stroke-width="9" stroke-linecap="round" />
    <line x1="500" y1="455" x2="500" y2="585"
          stroke="#1B4965" stroke-width="9" stroke-linecap="round" />

    <!-- Point estimates (small circles) where each bar crosses its center -->
    <circle cx="120" cy="520" r="5" fill="#5FA8D3" />
    <circle cx="158" cy="520" r="5" fill="#5FA8D3" />
    <circle cx="196" cy="520" r="5" fill="#5FA8D3" />
    <circle cx="234" cy="520" r="5" fill="#5FA8D3" />
    <circle cx="272" cy="520" r="5" fill="#5FA8D3" />
    <circle cx="310" cy="520" r="5" fill="#5FA8D3" />
    <circle cx="348" cy="520" r="5" fill="#5FA8D3" />
    <circle cx="386" cy="520" r="5" fill="#5FA8D3" />
    <circle cx="424" cy="520" r="5" fill="#5FA8D3" />
    <circle cx="462" cy="520" r="5" fill="#5FA8D3" />
    <circle cx="500" cy="520" r="5" fill="#5FA8D3" />
  </g>
</svg>
