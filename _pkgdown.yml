articles:
- title: Applied Track
  desc: >
    Workflow-oriented guides for producing site-level estimates from
    student rows, sufficient counts, or published aggregates;
    diagnosing the row schema; smoothing; and using estimates downstream.
  navbar: ~
  contents:
  - a1-getting-started
  - a2-input-formats
  - a3-scenario-binomial
  - a4-multivariate-multinomial
  - a5-published-aggregates
  - a6-diagnostics-and-suppression
  - a7-variance-smoothing-and-frechet
  - a8-downstream-workflows
  - a9-case-study-alabama-prek

- title: Methodological Track
  desc: >
    Formal specifications — sampling uncertainty, the scalar SE
    pipeline, SUR and multinomial covariance, aggregate engines,
    variance smoothing theory, Fréchet envelopes, and the output contract.
  navbar: ~
  contents:
  - m1-statistical-foundations
  - m2-scalar-se-binomial
  - m3-multivariate-sur-covariance
  - m4-multinomial-simplex
  - m5-aggregate-engines
  - m6-variance-smoothing-theory
  - m7-frechet-envelope-theory
  - m8-output-contract

reference:
- title: Package
  contents:
  - sitemix-package

- title: Estimate site-year rates
  desc: >
    Main entry points: student rows, sufficient counts, and published
    aggregates. Use `sm_estimate()` for the unified dispatcher; the
    wrappers preconfigure subsets of the same signature.
  contents:
  - sm_estimate
  - sm_estimate_from_counts
  - sm_estimate_from_aggregates

- title: Audit uncertainty outputs
  desc: >
    Diagnose scalar and covariance uncertainty and audit publisher-side
    suppression before downstream use.
  contents:
  - sm_diagnose
  - sm_suppression_report

- title: Inspect and stress-test covariance
  desc: >
    Work with `sm_vcov` matrices directly; compute formal raw pairwise
    Fréchet intervals and separate projected stress scenarios for
    unidentified D1 aggregate dependence.
  contents:
  - sm_vcov
  - sm_frechet_envelope

- title: Smooth standard errors (experimental)
  desc: >
    Opt-in generalized variance-function/log-variance sensitivity
    alternatives. A fixed-seed audit found no evidence for default promotion;
    append-only output preserves canonical SE columns and does not
    guarantee improvement.
  contents:
  - sm_smooth_variance

- title: Reshape published aggregates
  desc: >
    Pivot subgroup files into the schema expected by
    `sm_estimate_from_aggregates()`. Framing X turns subgroups into
    sites; Framing Y turns them into indicators.
  contents:
  - sm_pivot_subgroups_to_sites
  - sm_pivot_subgroups_to_indicators

- title: Data
  desc: Bundled example data for documentation, examples, and tests.
  contents:
  - alprek_subset

footer:
  structure:
    left: developed_by
    right: built_with

redirects:
- ["articles/a8-eb-handoff.html", "articles/a8-downstream-workflows.html"]
