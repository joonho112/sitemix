home:
  title: "sitemix — Proportions, rates, and sampling uncertainty"
  description: |
    Site- and group-level point estimates, standard errors, and optional
    covariance matrices. Covers student-row, sufficient-count, and
    published-aggregate inputs across five
    scenarios (A binomial, B multivariate, C multinomial, D0 / D1
    aggregate). Ships diagnostics, publisher-side suppression
    auditing, optional variance smoothing, and Fréchet-envelope
    sensitivity for unidentified D1 covariance.
  links:
  - text: "Get started in 5 minutes"
    href: articles/a1-getting-started.html
  - text: "Choose an input format"
    href: articles/a2-input-formats.html
  - text: "Theory: sampling uncertainty"
    href: articles/m1-statistical-foundations.html
  sidebar:
    structure: [links, license, community, citation, authors, dev]

